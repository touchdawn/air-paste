[package]
name = "airpaste-tray"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

# macOS-first menu-bar UI. The GUI stack is only pulled in on macOS so the rest of the
# workspace still builds (and cross-compiles to Windows) without the eframe/tray-icon tree.
[target.'cfg(target_os = "macos")'.dependencies]
eframe.workspace = true
tray-icon.workspace = true
